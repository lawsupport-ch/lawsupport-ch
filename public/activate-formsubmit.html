<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Activate FormSubmit</title>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;max-width:560px;margin:60px auto;padding:0 20px;line-height:1.5;color:#222}
  h1{font-size:22px;margin-bottom:8px}
  p{color:#555}
  button{background:#0a3d62;color:#fff;border:0;padding:14px 28px;font-size:16px;border-radius:6px;cursor:pointer;margin-top:12px}
  button:hover{background:#06283d}
  code{background:#f2f2f2;padding:2px 6px;border-radius:4px;font-size:13px}
</style>
</head>
<body>
<h1>Activate FormSubmit for info@goldblum.ch</h1>
<p>Click the button below. The browser will navigate to formsubmit.co, solve the Cloudflare challenge interactively, and trigger an activation email to <code>info@goldblum.ch</code>.</p>
<p>Check inbox <strong>and spam folder</strong> for a message from FormSubmit with an <strong>Activate</strong> link.</p>
<form action="https://formsubmit.co/info@goldblum.ch" method="POST">
  <input type="hidden" name="name" value="FormSubmit Activation">
  <input type="hidden" name="email" value="info@goldblum.ch">
  <input type="hidden" name="message" value="Activation request for lawsupport.ch contact form.">
  <input type="hidden" name="_subject" value="Activate FormSubmit for lawsupport.ch">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="https://lawsupport.ch/thank-you/">
  <input type="hidden" name="_captcha" value="false">
  <button type="submit">Send activation request</button>
</form>
</body>
</html>
